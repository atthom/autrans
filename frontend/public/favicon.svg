<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Calendar background -->
  <rect x="3" y="4" width="18" height="18" rx="2" fill="#10b981" stroke="#059669" stroke-width="1.5"/>
  
  <!-- Calendar header -->
  <rect x="3" y="4" width="18" height="5" rx="2" fill="#059669"/>
  
  <!-- Binding rings -->
  <line x1="7" y1="2" x2="7" y2="6" stroke="#059669" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="2" x2="17" y2="6" stroke="#059669" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Calendar grid dots -->
  <circle cx="7" cy="12" r="1" fill="white"/>
  <circle cx="12" cy="12" r="1" fill="white"/>
  <circle cx="17" cy="12" r="1" fill="white"/>
  
  <circle cx="7" cy="16" r="1" fill="white"/>
  <circle cx="12" cy="16" r="1" fill="white"/>
  <circle cx="17" cy="16" r="1" fill="white"/>
  
  <circle cx="7" cy="20" r="1" fill="white"/>
  <circle cx="12" cy="20" r="1" fill="white"/>
  <circle cx="17" cy="20" r="1" fill="white"/>
</svg>
